<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Deposit</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body id="page-deposit">
    <div class="container">
        <h1>ATM Deposit</h1>
        <form id="depositForm" action="enterpin.html" method="post">
            <label for="depositAmount">Enter Amount to Deposit:</label>
            <input type="number" id="depositAmount" min="1" max="10000" placeholder="Enter amount" required>

            <div class="button-grid">
                <button type="submit" class="btn deposit">Deposit</button>
                <button onclick="window.location.href='transactions.html'" class="btn cancel">
                    <img src="cancel_icon.png" alt="Cancel Icon">Cancel
                </button>
            </div>
        </form>
    </div>
    <script src="validation.js"></script>
</body>

</html>
