<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domestic Transaction</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body id="page-domestic">
    <div class="container">
        <h1>Domestic Transaction</h1>
        <form id="transactionForm" action="details.html" method="post">
            <div class="input-group">
                <label for="accountNumber">Account Number</label>
                <input type="text" id="accountNumber" placeholder="Enter Account Number" required>
                <div class="error-message" id="accountError"></div>
            </div>
            <div class="input-group">
                <label for="ifscCode">IFSC Code</label>
                <input type="text" id="ifscCode" placeholder="Enter IFSC Code" required>
                <div class="error-message" id="ifscError"></div>
            </div>

            <div class="button-grid">
                <button type="button" class="btn back" onclick="window.history.back()">
                    <img src="cancel_icon.png" alt="Back Icon">Back
                </button>
                <button type="submit" class="btn submit">Submit</button>
            </div>
        </form>
    </div>

    <script>
        const transactionForm = document.getElementById('transactionForm');

        transactionForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const accountNumber = document.getElementById('accountNumber').value;
            const ifscCode = document.getElementById('ifscCode').value;
            let valid = true;

            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');

            if (!/^\d{6,}$/.test(accountNumber)) {
                document.getElementById('accountError').textContent =
                    'Account number must be at least 6 digits';
                document.getElementById('accountError').style.display = 'block';
                valid = false;
            }

            if (!/^[A-Za-z0-9]{8,11}$/.test(ifscCode)) {
                document.getElementById('ifscError').textContent =
                    'IFSC code must be 8 to 11 characters (letters and numbers only)';
                document.getElementById('ifscError').style.display = 'block';
                valid = false;
            }

            if (valid) {
                // You can redirect or perform further actions here
                window.location.href = 'transactions.html'; // Uncomment if needed
            }
        });
    </script>
    <script src="validation.js"></script>
</body>

</html>
