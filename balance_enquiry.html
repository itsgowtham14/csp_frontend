<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Balance Enquiry</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body id="page-balance_enquiry">
    <div class="container">
        <h1>ATM Balance Enquiry</h1>
        <form id="balanceForm" action="enterpin.html" method="post">
            <label for="accountNumber">Enter Account Number:</label>
            <input type="number" id="accountNumber" placeholder="Enter your account number" required>

            <div class="button-grid">
                <button type="submit" class="btn check-balance">Check Balance</button>
                <button onclick="window.location.href='transactions.html'" class="btn cancel">
                    <img src="cancel_icon.png" alt="Cancel Icon">Cancel
                </button>
            </div>
        </form>
    </div>
    <script src="validation.js"></script>
</body>

</html>
